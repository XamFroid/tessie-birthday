<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Para mi Tessie 🤍</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Dancing+Script:wght@600&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-x:hidden}
body{background:#09040a;color:#ede0e4;font-family:"Cormorant Garamond",Georgia,serif}
#bg{position:fixed;inset:0;pointer-events:none;z-index:0}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;background:radial-gradient(ellipse at 50% 60%,#2e0d1a,#09040a);transition:opacity .9s ease,transform .9s ease}
#splash.out{opacity:0;transform:scale(1.04);pointer-events:none}
.si{max-width:380px;animation:fu 1.8s ease both}
@keyframes fu{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}
.glyph{font-size:1.3rem;letter-spacing:10px;color:#c9a84c;margin-bottom:.5rem;animation:gl 3s ease-in-out infinite alternate}
@keyframes gl{from{text-shadow:0 0 8px #c9a84c}to{text-shadow:0 0 24px #c9a84c,0 0 50px rgba(201,168,76,.3)}}
.kicker{font-family:Lato,sans-serif;font-size:.6rem;letter-spacing:6px;text-transform:uppercase;color:#e88fa0;margin-bottom:2rem}
.sname{font-family:"Dancing Script",cursive;font-size:clamp(2.6rem,10vw,4rem);color:#fdf6ee;line-height:1.2}
.sname em{color:#e5c97e;font-style:normal;display:block}
.hb{display:inline-block;font-size:1.8rem;margin:.8rem 0 1.6rem;animation:hba 1.6s ease-in-out infinite;color:#e88fa0}
@keyframes hba{0%,100%{transform:scale(1)}25%{transform:scale(1.38)}50%{transform:scale(1.1)}75%{transform:scale(1.32)}}
.hint{font-style:italic;font-size:1rem;color:#c8a0b0;line-height:1.7;margin-bottom:2.2rem}
.btn{position:relative;overflow:hidden;padding:.95rem 2.6rem;background:linear-gradient(135deg,#a33e54,#7c2d3e);color:#fdf6ee;border:none;cursor:pointer;border-radius:60px;font-family:Lato,sans-serif;font-size:.78rem;letter-spacing:4px;text-transform:uppercase;box-shadow:0 0 0 1.5px #c9a84c,0 8px 40px rgba(124,45,62,.55);transition:all .35s ease}
.btn::before{content:'';position:absolute;inset:0;border-radius:60px;background:linear-gradient(135deg,#e5c97e,#c9a84c);opacity:0;transition:opacity .35s ease}
.btn:hover::before,.btn:active::before{opacity:1}
.btn:hover,.btn:active{color:#180a10;box-shadow:0 0 0 1.5px #e5c97e,0 14px 50px rgba(201,168,76,.45);transform:translateY(-3px) scale(1.04)}
.btn span{position:relative;z-index:1}

/* VEIL */
#veil{position:fixed;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#2e0d1a,#09040a);opacity:0;pointer-events:none;transition:opacity .55s ease}
#veil.on{opacity:1;pointer-events:all}
.vt{font-family:"Dancing Script",cursive;font-size:clamp(1.8rem,8vw,3.2rem);color:#e5c97e;text-align:center;line-height:1.5;text-shadow:0 0 30px rgba(229,201,126,.45);animation:pt 1.6s ease-in-out infinite}
@keyframes pt{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.65;transform:scale(.97)}}

/* LETTER WRAP */
#lw{position:relative;z-index:5;min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:flex-start;padding:4rem 1.2rem 5rem;opacity:0;transition:opacity 1.4s ease}
#lw.on{opacity:1}

/* PAPER */
.paper{width:100%;max-width:540px;background:linear-gradient(145deg,rgba(34,13,22,.97),rgba(22,8,14,.99));border:1px solid rgba(201,168,76,.22);border-radius:3px;padding:clamp(1.8rem,6vw,3rem) clamp(1.4rem,5vw,2.6rem);box-shadow:0 0 0 1px rgba(201,168,76,.07),inset 0 2px 0 rgba(201,168,76,.12),0 40px 100px rgba(0,0,0,.75);position:relative}
.paper::before{content:'❤';position:absolute;top:-1rem;left:50%;transform:translateX(-50%);font-size:2rem;color:#a33e54;filter:drop-shadow(0 0 8px rgba(163,62,84,.7))}
.ldate{font-family:Lato,sans-serif;font-size:.6rem;letter-spacing:3px;text-transform:uppercase;color:#c9a84c;opacity:.7;margin-bottom:1.6rem}
.lto{font-family:"Dancing Script",cursive;font-size:clamp(1.7rem,7vw,2.4rem);color:#e5c97e;margin-bottom:1.4rem;line-height:1.2;min-height:2.8rem}
.lbody{font-size:clamp(1.05rem,3.8vw,1.2rem);line-height:2;color:#ede0e4;white-space:pre-wrap;padding-left:.5rem;min-height:4rem}
.cur{display:inline-block;width:2px;height:1em;background:#e88fa0;animation:bl .75s step-end infinite;vertical-align:text-bottom;margin-left:2px}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0}}
.lbot{margin-top:2rem;padding-top:1.2rem;border-top:1px solid rgba(201,168,76,.1);display:flex;flex-direction:column;align-items:flex-end;gap:.4rem}
.lsig{font-family:"Dancing Script",cursive;font-size:clamp(1.4rem,5vw,1.9rem);color:#e88fa0;opacity:0;transition:opacity 1.4s ease .3s}
.lsig.on{opacity:1}
.lsl{font-family:Lato,sans-serif;font-size:.55rem;letter-spacing:4px;text-transform:uppercase;color:#c9a84c;opacity:0;transition:opacity 1.2s ease .8s}
.lsl.on{opacity:.6}
.foot{margin-top:2.5rem;display:flex;flex-direction:column;align-items:center;gap:.6rem;opacity:0;transition:opacity 1.5s ease 1s;text-align:center}
.foot.on{opacity:1}
.fo{font-size:1rem;color:#c9a84c;letter-spacing:8px;opacity:.5}
.ftext{font-style:italic;font-size:.9rem;color:#c8a0b0;line-height:1.6}

/* MUSIC */
#mb{position:fixed;bottom:1.4rem;right:1.4rem;z-index:99;width:46px;height:46px;border-radius:50%;background:rgba(22,8,14,.92);border:1px solid rgba(201,168,76,.3);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:all .3s ease;backdrop-filter:blur(12px)}
#mb:hover{transform:scale(1.12);border-color:#c9a84c}
#mb.on{animation:mp 1.5s ease-in-out infinite;border-color:#c9a84c}
@keyframes mp{0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,.45)}50%{box-shadow:0 0 0 10px rgba(201,168,76,0)}}

/* FLOAT MSG */
.fm{position:fixed;pointer-events:none;z-index:9999;font-family:"Dancing Script",cursive;font-size:1rem;color:#f2c4ce;text-shadow:0 0 8px rgba(232,143,160,.5);opacity:0;white-space:nowrap;transition:opacity .25s ease,transform .7s ease}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div id="splash">
  <div class="si">
    <div class="glyph">&#10022; &#10022; &#10022;</div>
    <p class="kicker">Solo para ti</p>
    <h1 class="sname">Una carta<br/><em>para mi Tessie</em></h1>
    <div class="hb">&#10084;</div>
    <p class="hint">Escrita desde lo m&aacute;s profundo<br/>de mi coraz&oacute;n, para la persona<br/>m&aacute;s bo&ntilde;ita de mi vida.</p>
    <button class="btn" id="ob"><span>Abrir mi carta &#128140;</span></button>
  </div>
</div>

<div id="veil">
  <div class="vt">Con todo mi amor<br/>para ti, mi Tessie &#10084;</div>
</div>

<button id="mb">&#127925;</button>

<div id="lw">
  <div class="paper">
    <div class="ldate" id="ld"></div>
    <div class="lto" id="lt"></div>
    <div class="lbody" id="lb"><span class="cur"></span></div>
    <div class="lbot">
      <div class="lsig" id="ls">Con todo mi amor &#127801;</div>
      <div class="lsl" id="ll">Tuyo, siempre &#10022;</div>
    </div>
  </div>
  <div class="foot" id="ft">
    <div class="fo">&#10022; &#10022; &#10022;</div>
    <p class="ftext">Hecha con amor, exclusivamente<br/>para mi ni&ntilde;ita peshosha. &#128149;</p>
  </div>
</div>

<script>
var GREETING = "Mi Tessie hermosha,";
var LETTER   = "Hoy, en tu cumpleaños, solo pienso en lo afortunado que soy de tenerte en mi vida.\n\nMi Tessie... no sé si alguna vez te lo he dicho con suficientes palabras, pero tú eres de esas personas que llegan y sin pedir permiso te cambian todo. De las que hacen que hasta el día más aburrido se vuelva especial.\n\nEres tan boñita cuando sonríes. Tan peshosha cuando estás siendo tonta. Tan hermosha en cada versión tuya que me has regalado ver.\n\nMi niñita, hay algo en ti que no encuentro en ningún otro lado. Esa forma de ser, esa risa, esa manera en la que dices las cosas... todo eso me tiene completamente enamorado de ti.\n\nNo vengo aquí a prometerte el mundo, porque ya lo tienes. Solo quiero que sepas que en este momento, en este día que es tuyo, yo estoy aquí pensando en ti con una sonrisa que no puedo esconder.\n\nFeliz cumpleaños, mi Tessie. Mi hermosha. Mi niñita boñita.\n\nQue este año te traiga todo lo que mereces, que es muchísimo.\n\nTe quiero.";
var SECRET   = ["Mi Tessie ❤","Boñita peshosha ✨","Te quiero mucho 💙","Mi niñita 🌹","Hermosha ✨","Solo tú ♥"];

// ── CANVAS PARTICLES ──────────────────────────
var bc = document.getElementById("bg");
var bx = bc.getContext("2d");
var pts = [], orbT = 0;
function rz(){ bc.width = innerWidth; bc.height = innerHeight; }
function dh(c,x,y,s){ c.beginPath(); c.moveTo(x,y+s*.3); c.bezierCurveTo(x,y,x-s,y,x-s,y+s*.5); c.bezierCurveTo(x-s,y+s,x,y+s*1.3,x,y+s*1.5); c.bezierCurveTo(x,y+s*1.3,x+s,y+s,x+s,y+s*.5); c.bezierCurveTo(x+s,y,x,y,x,y+s*.3); c.closePath(); c.fill(); }
function mkPt(){ return { x:Math.random()*bc.width, y:Math.random()*bc.height, s:Math.random()*1.8+.4, sp:Math.random()*.35+.08, dr:(Math.random()-.5)*.25, tw:Math.random()*Math.PI*2, heart:Math.random()<.2 }; }
function tickPt(p){ p.y-=p.sp; p.x+=p.dr; p.tw+=.04; if(p.y<-15){ p.x=Math.random()*bc.width; p.y=bc.height+10; } }
function drawPt(p){ var a=Math.max(0,Math.sin(p.tw)*.3+.45); bx.save(); bx.globalAlpha=a; if(p.heart){ bx.fillStyle="#e88fa0"; dh(bx,p.x,p.y,p.s*2); } else { bx.fillStyle="#e5c97e"; bx.beginPath(); bx.arc(p.x,p.y,p.s,0,Math.PI*2); bx.fill(); } bx.restore(); }
var ORBS = [{x:.5,y:.3,r:200,h:340},{x:.15,y:.7,r:150,h:45},{x:.85,y:.6,r:130,h:330}];
function bf(){ bx.clearRect(0,0,bc.width,bc.height); orbT+=.008; ORBS.forEach(function(o,i){ var cx=(o.x+Math.sin(orbT+i)*.06)*bc.width, cy=(o.y+Math.cos(orbT+i*1.3)*.05)*bc.height, g=bx.createRadialGradient(cx,cy,0,cx,cy,o.r); g.addColorStop(0,"hsla("+o.h+",70%,50%,.07)"); g.addColorStop(1,"transparent"); bx.fillStyle=g; bx.beginPath(); bx.arc(cx,cy,o.r,0,Math.PI*2); bx.fill(); }); pts.forEach(function(p){ tickPt(p); drawPt(p); }); requestAnimationFrame(bf); }
rz(); for(var i=0;i<55;i++) pts.push(mkPt()); bf();
window.addEventListener("resize", rz);

// ── OPEN BUTTON ───────────────────────────────
document.getElementById("ob").addEventListener("click", function(){
  var veil = document.getElementById("veil");
  veil.classList.add("on");
  setTimeout(function(){
    document.getElementById("splash").classList.add("out");
    setTimeout(function(){
      veil.classList.remove("on");
      var lw = document.getElementById("lw");
      lw.style.display = "flex";
      setTimeout(function(){
        lw.classList.add("on");
        // Date
        var d = new Date();
        document.getElementById("ld").textContent = d.toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
        // Typewriter greeting
        var lt = document.getElementById("lt"), gi = 0;
        function tg(){
          if(gi < GREETING.length){ lt.textContent += GREETING[gi++]; setTimeout(tg, 55+Math.random()*25); }
          else { setTimeout(tl, 350); }
        }
        // Typewriter letter
        function tl(){
          var lb = document.getElementById("lb"), cur = lb.querySelector(".cur"), li = 0;
          function tt(){
            if(li < LETTER.length){
              var ch = LETTER[li++];
              cur.insertAdjacentText("beforebegin", ch);
              var dl = (ch==="
") ? 280 : (ch==="."||ch==="!"||ch==="?") ? 180 : (ch===",") ? 100 : 30+Math.random()*14;
              setTimeout(tt, dl);
            } else {
              cur.remove();
              document.getElementById("ls").classList.add("on");
              document.getElementById("ll").classList.add("on");
              setTimeout(function(){ document.getElementById("ft").classList.add("on"); }, 600);
            }
          }
          tt();
        }
        tg();
      }, 80);
    }, 1900);
  }, 450);
});

// ── MUSIC ─────────────────────────────────────
var MB = document.getElementById("mb"), AC=null, GN=null, mOn=false, mT=null, mI=0;
var MEL=[[523.25,.5],[659.25,.25],[587.33,.25],[523.25,.5],[440,.5],[392,.25],[440,.25],[523.25,.75],[493.88,.5],[440,.5],[523.25,.25],[587.33,.25],[659.25,.5],[523.25,.5],[440,1],[392,.5],[440,.25],[493.88,.25],[523.25,1]];
function pN(f,d){ var o=AC.createOscillator(),e=AC.createGain(); o.type="triangle"; o.frequency.value=f; e.gain.setValueAtTime(0,AC.currentTime); e.gain.linearRampToValueAtTime(.10,AC.currentTime+.06); e.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d); o.connect(e); e.connect(GN); o.start(); o.stop(AC.currentTime+d); }
function pm(){ if(!mOn)return; var n=MEL[mI%MEL.length]; pN(n[0],n[1]*.88); mI++; mT=setTimeout(pm,n[1]*860); }
MB.addEventListener("click", function(){
  if(!AC){ AC=new(window.AudioContext||window.webkitAudioContext)(); GN=AC.createGain(); GN.gain.value=.55; GN.connect(AC.destination); }
  if(!mOn){ mOn=true; MB.classList.add("on"); MB.textContent="♫"; pm(); }
  else { mOn=false; clearTimeout(mT); MB.classList.remove("on"); MB.textContent="🎵"; }
});

// ── SECRET FLOAT MESSAGES ─────────────────────
document.addEventListener("click", function(e){
  if(e.target.closest("button")) return;
  var m = document.createElement("div");
  m.className = "fm";
  m.textContent = SECRET[Math.floor(Math.random()*SECRET.length)];
  m.style.left = (e.clientX-40)+"px";
  m.style.top  = (e.clientY-16)+"px";
  document.body.appendChild(m);
  requestAnimationFrame(function(){
    m.style.opacity="1"; m.style.transform="translateY(-28px)";
    setTimeout(function(){ m.style.opacity="0"; m.style.transform="translateY(-55px)"; setTimeout(function(){ m.remove(); },700); }, 1100);
  });
});

// ── SCROLL PARALLAX ───────────────────────────
var lsy=0;
window.addEventListener("scroll", function(){ var sy=scrollY,dy=sy-lsy; pts.forEach(function(p){ p.y-=dy*.04; }); lsy=sy; },{passive:true});
</script>
</body>
</html>
